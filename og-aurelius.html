<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #050508 0%, #0a0a10 50%, #16161f 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: #F1F5F9;
  overflow: hidden;
  position: relative;
}
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
  top: -100px;
  right: -50px;
  border-radius: 50%;
}
.glow2 {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 70%);
  bottom: -80px;
  left: -50px;
  border-radius: 50%;
}
.content {
  text-align: center;
  z-index: 1;
  padding: 60px;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}
.logo-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #F59E0B, #D97706);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 900;
  color: #050508;
}
.logo-text {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 4px;
  color: #F59E0B;
}
h1 {
  font-size: 48px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 20px;
  max-width: 900px;
}
h1 span { color: #F59E0B; }
p {
  font-size: 22px;
  color: #94A3B8;
  max-width: 700px;
  margin: 0 auto;
}
.badge {
  display: inline-block;
  margin-top: 30px;
  padding: 10px 28px;
  background: linear-gradient(135deg, #F59E0B, #D97706);
  color: #050508;
  font-weight: 700;
  font-size: 18px;
  border-radius: 8px;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo">
      <div class="logo-icon">A</div>
      <div class="logo-text">AURELIUS</div>
    </div>
    <h1>Sua Equipe Digital<br><span>no WhatsApp</span></h1>
    <p>IA que atende, qualifica, agenda e cobra — 24h por dia, 7 dias por semana.</p>
    <div class="badge">Teste grátis 7 dias →</div>
  </div>
</body>
</html>
